<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Cumulative Distribution — Upload</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f7; margin: 0; padding: 40px 16px;
    color: #333;
  }
  .card {
    max-width: 560px; margin: 0 auto; background: #fff;
    border-radius: 8px; padding: 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .subtitle { color: #666; font-size: 13px; margin-bottom: 28px; }
  .drop {
    border: 2px dashed #cdd5e0; border-radius: 8px;
    padding: 32px 16px; text-align: center; background: #fafbfd;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }
  .drop:hover, .drop.dragover { border-color: #4a90e2; background: #eef5fd; }
  .drop input { display: none; }
  .file-list {
    margin: 16px 0 0; padding: 0; list-style: none;
    font-size: 13px; color: #555;
  }
  .file-list li { padding: 4px 0; }
  .file-list li::before { content: "✓ "; color: #4a90e2; }
  button#submit {
    margin-top: 20px; width: 100%; padding: 12px 16px;
    font-size: 14px; font-weight: 600;
    background: #4a90e2; color: #fff; border: none; border-radius: 6px;
    cursor: pointer; transition: background 0.15s;
  }
  button#submit:hover { background: #3a7cc5; }
  button#submit:disabled { background: #bbb; cursor: not-allowed; }
  .progress {
    margin-top: 16px; padding: 12px; background: #fff8e1;
    border-radius: 4px; font-size: 13px; color: #6b5b00;
    display: none;
  }
  .progress.active { display: block; }
  .progress.error { background: #ffebee; color: #b71c1c; }
  .progress.success { background: #e8f5e9; color: #2e7d32; }
  .recent {
    margin-top: 28px; padding-top: 20px;
    border-top: 1px solid #eee;
  }
  .recent h2 { font-size: 13px; color: #666; margin: 0 0 8px; font-weight: 600; }
  .recent ul { padding: 0; list-style: none; margin: 0; font-size: 13px; }
  .recent a { color: #4a90e2; text-decoration: none; }
  .recent a:hover { text-decoration: underline; }
  .recent .meta { color: #999; font-size: 11px; margin-left: 8px; }
</style>
</head>
<body>
<div class="card">
  <h1>Cumulative Distribution Dashboard</h1>
  <div class="subtitle">학교별 CSV (a_school.csv, b_school.csv ...)을 한 번에 올려주세요. 처리 후 그래프 URL을 받습니다.</div>

  <form id="form">
    <label class="drop" id="drop">
      <input type="file" id="files" name="files" multiple accept=".csv">
      <div><strong>CSV 파일 선택</strong> 또는 여기에 드래그</div>
      <div style="font-size:12px;color:#888;margin-top:6px">여러 파일 한 번에 선택 가능</div>
    </label>
    <ul class="file-list" id="list"></ul>
    <button type="submit" id="submit" disabled>업로드</button>
    <div class="progress" id="progress"></div>
  </form>

  <div class="recent" id="recent" style="display:none">
    <h2>최근 빌드</h2>
    <ul id="recent-list"></ul>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const drop = $('drop'), input = $('files'), list = $('list');
const form = $('form'), submit = $('submit'), progress = $('progress');

function showFiles(files) {
  list.innerHTML = '';
  for (const f of files) {
    const li = document.createElement('li');
    li.textContent = `${f.name} (${(f.size/1024).toFixed(1)} KB)`;
    list.appendChild(li);
  }
  submit.disabled = files.length === 0;
}

input.addEventListener('change', () => showFiles(input.files));
drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', (e) => {
  e.preventDefault();
  drop.classList.remove('dragover');
  input.files = e.dataTransfer.files;
  showFiles(input.files);
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!input.files.length) return;
  submit.disabled = true;
  progress.classList.remove('error', 'success');
  progress.classList.add('active');
  progress.textContent = '업로드 중 ... CSV 파싱 + CDF 계산 + 차트 데이터 생성에 약 30초 ~ 1분 정도 소요됩니다.';

  const fd = new FormData();
  for (const f of input.files) fd.append('files', f, f.name);

  try {
    const resp = await fetch('/upload', { method: 'POST', body: fd });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
    progress.classList.add('success');
    progress.textContent = `완료! ${data.n_subjects} subjects · ${data.n_schools} schools · ${data.elapsed_s}s. 이동합니다...`;
    rememberRecent(data);
    setTimeout(() => { window.location.href = data.url; }, 800);
  } catch (err) {
    progress.classList.add('error');
    progress.textContent = '실패: ' + err.message;
    submit.disabled = false;
  }
});

// localStorage 최근 빌드 목록
const KEY = 'dashboard-recent-builds-v1';
function getRecent() {
  try { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
  catch { return []; }
}
function rememberRecent(data) {
  const recent = getRecent();
  recent.unshift({
    id: data.dataset_id,
    url: data.url,
    n_subjects: data.n_subjects,
    n_schools: data.n_schools,
    at: Date.now(),
  });
  localStorage.setItem(KEY, JSON.stringify(recent.slice(0, 10)));
}
function renderRecent() {
  const items = getRecent();
  if (!items.length) return;
  $('recent').style.display = 'block';
  const ul = $('recent-list');
  ul.innerHTML = '';
  for (const it of items) {
    const li = document.createElement('li');
    const ago = Math.round((Date.now() - it.at) / 60000);
    li.innerHTML = `<a href="${it.url}">${it.id}</a><span class="meta">${it.n_subjects} subjects · ${it.n_schools} schools · ${ago}분 전</span>`;
    ul.appendChild(li);
  }
}
renderRecent();
</script>
</body>
</html>
