<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Report</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #fafafa; margin: 0; color: #222;
}

/* ── topbar: 제목 + 세션 정보 인라인 ─────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid #ddd;
  padding: 8px 16px; display: flex; gap: 10px; align-items: center;
  flex-wrap: wrap; box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.topbar h1 { font-size: 15px; margin: 0 8px 0 0; color: #1a1a2e; font-weight: 700; }
.back-btn {
  padding: 5px 12px; border-radius: 6px; border: 1px solid #d0d5dd;
  background: #fff; cursor: pointer; font-size: 12px; color: #555;
  text-decoration: none;
}
.back-btn:hover { background: #f0f6ff; border-color: #4a90e2; color: #4a90e2; }

.topbar-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex: 1; }
.meta-inline {
  font-size: 12px; color: #444; background: #f3f5f8;
  padding: 3px 9px; border-radius: 4px; white-space: nowrap;
}
.meta-inline .mk { color: #999; margin-right: 4px; font-size: 11px; }
.meta-inline-file {
  font-size: 12px; color: #444; max-width: 280px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pt-badge {
  display: inline-block; padding: 3px 11px; border-radius: 4px;
  font-size: 12px; font-weight: 700; color: #fff;
}
.pt-badge.MDDI { background: #4a90e2; }
.pt-badge.PDDI { background: #16a34a; }
.pt-badge.PMIC { background: #d97706; }
.pt-badge.SECURITY { background: #9333ea; }
.pt-badge.default { background: #64748b; }
/* ── tabs ──────────────────────────────────────────────────────────────── */
.tabs {
  display: flex; gap: 2px; background: #fff;
  border-bottom: 1px solid #ddd; padding: 0 16px;
  position: sticky; top: 49px; z-index: 90;
}
.tab {
  padding: 9px 18px; font-size: 13px; font-weight: 700; color: #777;
  background: transparent; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; transition: color .1s;
}
.tab:hover { color: #4a90e2; }
.tab.active { color: #1f4d8c; border-bottom-color: #4a90e2; }

/* ── content ───────────────────────────────────────────────────────────── */
.content { padding: 18px 20px 90px; max-width: 1200px; margin: 0 auto; }
.panel { display: none; }
.panel.active { display: block; }

.section-title {
  font-size: 13px; font-weight: 700; color: #333;
  margin: 0 0 8px; padding-bottom: 6px; border-bottom: 1px solid #eef0f3;
}
.section-title.small { margin-top: 24px; }

table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 8px; }
th, td { padding: 6px 10px; border-bottom: 1px solid #eef0f3; text-align: left; }
th { background: #f6f7f9; font-weight: 600; color: #555; font-size: 11px; }
td { color: #222; }
tbody tr:hover { background: #f9fbff; }

.kv-table { width: auto; min-width: 360px; }
.kv-table th { width: 160px; background: #f6f7f9; text-align: left; }

/* ── grid (xlsx 원형 재현: 구조 + 상대크기) ─────────────────────────────── */
.grid-wrap { overflow-x: auto; margin-bottom: 12px; }
.grid-table {
  width: auto; border-collapse: collapse; table-layout: fixed;
  background: #fff; margin-bottom: 0;
}
.grid-table td {
  border: 1px solid #e3e6ea; padding: 2px 6px; vertical-align: middle;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: #222; font-size: 12px; line-height: 1.3;
}
.grid-table tbody tr:hover { background: transparent; }
.grid-table td.editing {
  white-space: normal; outline: none; cursor: text;
}
.grid-table td.editing:focus { background: #fffbe6; box-shadow: inset 0 0 0 2px #4a90e2; }
.grid-table td .dist-img { max-width: 100%; height: auto; display: block; }
.grid-table td.empty { background: #fcfcfd; }

/* ── sheet-table (xlsx 텍스트 데이터 원형 재현) ────────────────────────── */
.sheet-wrap { overflow-x: auto; margin-bottom: 16px; }
.sheet-table {
  width: auto; border-collapse: collapse; font-size: 12px;
  background: #fff; margin-bottom: 0;
}
.sheet-table th {
  background: #e8eef4; font-weight: 700; padding: 5px 8px;
  border: 1px solid #b0bec5; white-space: nowrap; color: #1a3a5c;
  vertical-align: middle; text-align: left;
}
.sheet-table td {
  padding: 4px 8px; border: 1px solid #d0d7de;
  white-space: nowrap; vertical-align: middle; color: #222;
}
.sheet-table tbody tr:nth-child(even) td { background: #f7f9fb; }
.sheet-table tbody tr:hover td { background: #edf3fc; }
.sheet-table td.st-empty { color: #bbb; }
.sheet-table td.st-num { text-align: left; }
.sheet-table td.editing-cell {
  outline: none; cursor: text; background: #fffbe6 !important;
}
.sheet-table td.editing-cell:focus { box-shadow: inset 0 0 0 2px #4a90e2; }
.sheet-table td.sheet-subhead {
  background: #e8eef4 !important; font-weight: 700; color: #1a3a5c;
}
.sheet-table td.cell-selected {
  background: #cfe3fb !important; outline: 1px solid #4a90e2; outline-offset: -1px;
}
.sheet-block { margin-bottom: 24px; }
.sheet-block-title {
  font-size: 12px; font-weight: 700; color: #1f4d8c;
  margin: 0 0 6px; padding: 3px 8px;
  background: #eef3fb; border-left: 3px solid #4a90e2; border-radius: 0 4px 4px 0;
}

.text-lines {
  font-size: 13px; color: #333; line-height: 1.7;
  background: #fff; border: 1px solid #eef0f3; border-radius: 6px;
  padding: 12px 16px; margin-bottom: 8px;
}
.text-lines div { padding: 1px 0; }

.placeholder { font-size: 13px; color: #999; padding: 40px 20px; text-align: center; }

/* ── distribution combined PNG ─────────────────────────────────────────── */
.dist-combined-wrap {
  overflow: auto; padding: 8px 0;
}
.dist-combined-img {
  max-width: 100%; height: auto; display: block; cursor: zoom-in;
}

/* ── distribution gallery ──────────────────────────────────────────────── */
.gallery {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.gallery a {
  display: block; border: 1px solid #e0e0e0; border-radius: 8px;
  overflow: hidden; background: #fff; transition: border-color .1s, box-shadow .1s;
}
.gallery a:hover { border-color: #4a90e2; box-shadow: 0 0 0 2px rgba(74,144,226,.2); }
.gallery img { width: 100%; height: auto; display: block; }

.error-box {
  background: #fef2f2; color: #991b1b; padding: 12px 16px;
  border-radius: 6px; font-size: 13px; margin: 16px 20px;
}

/* ── edit mode ─────────────────────────────────────────────────────────── */
.edit-section-title { font-size: 12px; font-weight: 700; color: #555; margin: 18px 0 6px; }
.edit-hint { font-size: 11px; color: #888; margin: 2px 0 8px; }
.cell-input, .field-input {
  width: 100%; padding: 4px 6px; border: 1px solid #d0d5dd;
  border-radius: 4px; font-size: 12px; outline: none;
}
.cell-input:focus, .field-input:focus { border-color: #4a90e2; }
.edit-table td input { min-width: 70px; }
.field-input.title { max-width: 600px; font-weight: 700; }
.field-textarea {
  width: 100%; min-height: 110px; padding: 8px; border: 1px solid #d0d5dd;
  border-radius: 6px; font-size: 12px; outline: none;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}
.field-textarea:focus { border-color: #4a90e2; }
.kv-edit {
  display: grid; grid-template-columns: 200px 1fr; gap: 6px 12px;
  align-items: center; max-width: 720px; margin-bottom: 8px;
}
.kv-edit label { font-size: 12px; color: #555; word-break: break-all; }
.btn-sm {
  margin-top: 6px; padding: 4px 12px; font-size: 12px;
  border: 1px solid #d0d5dd; background: #fff; border-radius: 4px; cursor: pointer;
}
.btn-sm:hover { border-color: #4a90e2; color: #4a90e2; }
.btn-del-row {
  border: none; background: transparent; color: #dc2626;
  font-size: 16px; cursor: pointer; line-height: 1; padding: 0 6px;
}
.btn-del-row:hover { color: #b91c1c; }

.edit-bar {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 95;
  background: #fff; border-top: 1px solid #ddd; box-shadow: 0 -1px 8px rgba(0,0,0,.08);
  padding: 10px 20px; align-items: center; gap: 12px;
}
.edit-bar.show { display: flex; }
.edit-bar .bar-msg { font-size: 13px; color: #8a6d00; font-weight: 600; }
.edit-bar .grow { flex: 1; }
.btn-save {
  padding: 7px 18px; border-radius: 6px; border: none;
  background: #16a34a; color: #fff; font-weight: 700; cursor: pointer; font-size: 13px;
}
.btn-save:hover { background: #15803d; }
.btn-cancel {
  padding: 7px 16px; border-radius: 6px; border: 1px solid #d0d5dd;
  background: #fff; cursor: pointer; font-size: 13px;
}

/* ── toast ─────────────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 10px 18px; border-radius: 6px;
  font-size: 13px; opacity: 0; transition: opacity .2s;
  pointer-events: none; z-index: 1000; max-width: 80%;
}
.toast.show { opacity: 1; }

/* ── 선택 셀 합계/평균 표시줄 (엑셀 상태바 느낌) ───────────────────────────── */
.calc-bar {
  position: fixed; bottom: 12px; right: 16px; z-index: 96;
  background: #1f2937; color: #fff; padding: 7px 14px; border-radius: 8px;
  font-size: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.25);
  display: none; gap: 16px; align-items: center;
}
.calc-bar.show { display: inline-flex; }
.calc-bar.lift { bottom: 60px; }
.calc-bar .ci { color: #9ca3af; margin-right: 4px; }
.calc-bar .cv { color: #fff; font-weight: 700; }

/* ── PIN modal ─────────────────────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box { background: #fff; border-radius: 10px; padding: 24px; width: 360px; max-width: 90%; }
.modal-title { font-size: 16px; font-weight: 600; margin: 0 0 8px; }
.modal-desc { font-size: 13px; color: #666; margin: 0 0 14px; }
.pin-row { display: flex; gap: 8px; justify-content: center; }
.pin-cell {
  width: 44px; height: 50px; text-align: center; font-size: 22px;
  border: 1px solid #d0d5dd; border-radius: 6px; outline: none;
  -moz-appearance: textfield; appearance: textfield;
}
.pin-cell::-webkit-outer-spin-button,
.pin-cell::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.pin-cell:focus { border-color: #4a90e2; }
.modal-hint { font-size: 11px; color: #888; text-align: center; margin: 8px 0 0; }
.modal-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
.modal-btn {
  padding: 8px 16px; font-size: 13px; border-radius: 6px;
  border: 1px solid #d0d5dd; background: #fff; cursor: pointer;
}
.modal-btn.primary { background: #4a90e2; color: #fff; border-color: #4a90e2; }
.modal-btn.danger { background: #dc2626; color: #fff; border-color: #dc2626; }

/* ── topbar 수정/삭제 버튼 ─────────────────────────────────────────────────── */
.topbar-actions { display: flex; gap: 8px; align-items: center; margin-left: auto; }
.btn-topbar-edit {
  padding: 5px 14px; border-radius: 6px; border: 1px solid #4a90e2;
  background: #fff; cursor: pointer; font-size: 12px; color: #4a90e2; font-weight: 600;
}
.btn-topbar-edit:hover { background: #f0f6ff; }
.btn-topbar-del {
  padding: 5px 12px; border-radius: 6px; border: 1px solid #fca5a5;
  background: #fff; cursor: pointer; font-size: 12px; color: #dc2626;
}
.btn-topbar-del:hover { background: #fef2f2; }

/* 자동저장 상태 표시 (edit bar 왼쪽) */
.autosave-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #d1d5db;
  display: inline-block; margin-right: 4px; transition: background .3s;
}
.autosave-dot.dirty  { background: #f59e0b; }
.autosave-dot.saving { background: #60a5fa; }
.autosave-dot.saved  { background: #22c55e; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="/pe/report/">← 검색결과</a>
  <h1>Report</h1>
  <div class="topbar-meta" id="topbarMeta">
    <span class="meta-inline">로드 중...</span>
  </div>
  <div class="topbar-actions" id="topbarActions">
    <button class="btn-topbar-edit" id="btnEdit">✎ 수정</button>
    <button class="btn-topbar-del"  id="btnDel">삭제</button>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="summary">Summary</button>
  <button class="tab" data-tab="yield">Yield</button>
  <button class="tab" data-tab="issues">Issue Table</button>
</div>

<div id="errorBox" class="error-box" style="display:none"></div>

<div class="content">
  <div class="panel active" id="panel-summary"><div class="placeholder">로드 중...</div></div>
  <div class="panel" id="panel-yield"><div class="placeholder">로드 중...</div></div>
  <div class="panel" id="panel-issues"><div class="placeholder">로드 중...</div></div>
</div>

<!-- 수정 모드 저장 바 -->
<div class="edit-bar" id="editBar">
  <span class="bar-msg">
    <span class="autosave-dot" id="autosaveDot" title="자동저장 상태"></span>
    ✎ 수정 모드 — 셀을 클릭해 편집하세요. 탭 전환 시 자동저장됩니다.
  </span>
  <span class="grow"></span>
  <button class="btn-cancel" id="editCancel">취소</button>
  <button class="btn-save" id="editSave">저장</button>
</div>

<div class="toast" id="toast"></div>

<!-- 드래그로 선택한 숫자들의 개수/합계/평균 (엑셀 상태바) -->
<div class="calc-bar" id="calcBar"></div>

<!-- PIN 모달 (수정/삭제 공용) -->
<div class="modal-overlay" id="pinModal">
  <div class="modal-box">
    <p class="modal-title" id="pinTitle">비밀번호 입력</p>
    <p class="modal-desc" id="pinDesc">비밀번호를 입력하세요.</p>
    <div class="pin-row">
      <input class="pin-cell" type="password" inputmode="numeric" autocomplete="off" maxlength="1" id="pin0">
      <input class="pin-cell" type="password" inputmode="numeric" autocomplete="off" maxlength="1" id="pin1">
      <input class="pin-cell" type="password" inputmode="numeric" autocomplete="off" maxlength="1" id="pin2">
      <input class="pin-cell" type="password" inputmode="numeric" autocomplete="off" maxlength="1" id="pin3">
    </div>
    <p class="modal-hint">숫자 4자리</p>
    <div class="modal-actions">
      <button class="modal-btn" id="pinCancel">취소</button>
      <button class="modal-btn primary" id="pinConfirm">확인</button>
    </div>
  </div>
</div>

<script>
const SESSION_ID = location.pathname.split("/").pop();
const YIELD_COLS = ["item_name", "bin_number", "yield_percent", "fail_count",
                    "cpk_val", "mean_val", "stdev_val", "lsl", "usl", "unit"];

// ── 없는 sheet 용 기본 표 골격(frame) ──────────────────────────────────────────
// 업로드 xlsx 에 해당 sheet 가 없으면 헤더만 있는 빈 표(헤더 + 빈 행 1개)를 보여준다.
// 동적 source 열({src}_count/_yield)은 sheet 가 없으면 알 수 없으므로 정적 열만 포함.
// 헤더 값은 생성기 client/report_generator/xlsx_writer.py 레이아웃과 일치.
const YIELD_FRAME_COLS = ["step", "bin", "TNO", "Item", "avg", "comment"];
const ISSUE_FRAME_COLS = ["Category", "Step", "Bin", "TNO", "Item", "avg", "Distribution",
                          "comment", "개발 1차 comment", "PTE 2차 comment", "개발 2차 comment"];
const SUMMARY_FRAME_BLOCKS = [
  { label: "1. Device Feature",
    headers: ["DEVICE", "Customer", "PKG_Type", "GrossDie", "Process Line", "EVT_Version"] },
  { label: "2. Yield",
    headers: ["Lot NO", "Yield", "Major Fail Bins", "Comment"] },
  { label: "3. Evaluation Summary",
    headers: ["Category", "Condition & Judge Limit", "Result"] },
];

// 헤더+빈 행 1개용 행 객체 (모든 열 빈 문자열)
function frameRow(cols) { const o = {}; cols.forEach(c => { o[c] = ""; }); return o; }
// summary blocks frame: 블록마다 빈 행 1개
function summaryFrameData() {
  return { blocks: SUMMARY_FRAME_BLOCKS.map(b => ({
    label: b.label, headers: b.headers, rows: [b.headers.map(() => "")] })) };
}

// legacy summary dict 에 표시할 의미있는 내용이 있는지 (title 단독은 제외)
function summaryDictHasContent(st) {
  if (!st || typeof st !== "object") return false;
  return !!((st.feature && Object.keys(st.feature).length) ||
            (Array.isArray(st.yield_summary_text) && st.yield_summary_text.length) ||
            (Array.isArray(st.major_fail_bins) && st.major_fail_bins.length) ||
            (st.evaluation && Object.keys(st.evaluation).length) ||
            (Array.isArray(st.raw_rows) && st.raw_rows.length));
}

// 표 3종이 "정말로 비었을 때"만 frame 구조로 시드 → 보기/수정/저장이 신규 포맷 경로를 탄다.
// 판정 조건은 각 render* 의 emptyPanel fall-through 와 동일.
function seedEmptyFrames() {
  if (!DATA) return;
  const summaryRows = DATA.summary;

  // summary: blocks/grid 아니고 legacy dict 내용도 summary_rows 도 없을 때
  if (!isSummaryBlocks(DATA.summary_text) && !isGrid(DATA.summary_text) &&
      !summaryDictHasContent(DATA.summary_text) &&
      !(Array.isArray(summaryRows) && summaryRows.length)) {
    DATA.summary_text = summaryFrameData();
  }

  // yield: yield_text(list/grid) 미사용 그리고 legacy summary_rows 도 없을 때
  if (!(Array.isArray(DATA.yield_text) && DATA.yield_text.length) &&
      !isGrid(DATA.yield_text) &&
      !(Array.isArray(summaryRows) && summaryRows.length)) {
    DATA.yield_text = [frameRow(YIELD_FRAME_COLS)];
  }

  // issue: issue_table_text(list/grid) 미사용일 때
  if (!(Array.isArray(DATA.issue_table_text) && DATA.issue_table_text.length) &&
      !isGrid(DATA.issue_table_text)) {
    DATA.issue_table_text = [frameRow(ISSUE_FRAME_COLS)];
  }
}

// CSRF: 서버가 /view 응답에 내려준 double-submit 쿠키를 읽어 변경요청 헤더로 되돌려준다.
function csrfToken() {
  const m = document.cookie.match(/(?:^|;\s*)report_csrf=([^;]+)/);
  return m ? decodeURIComponent(m[1]) : "";
}

let DATA = null;
let MODE = "view";              // "view" | "edit"
let verifiedPassword = "";      // 수정 모드 진입 시 검증된 PIN (저장에 재사용)


// & < > " ' 모두 이스케이프 → 텍스트/속성 양쪽에서 안전
function esc(v) {
  return String(v ?? "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function fmtDate(unix) {
  if (!unix) return "-";
  const d = new Date(unix * 1000);
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function showToast(msg, ms=2200) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), ms);
}

function splitLines(v) {
  const a = (v || "").split("\n");
  while (a.length && a[a.length - 1].trim() === "") a.pop();
  return a;
}

// ── tab switching ──────────────────────────────────────────────────────────
document.getElementById("tabs").addEventListener("click", e => {
  const btn = e.target.closest(".tab");
  if (!btn) return;
  const tab = btn.dataset.tab;
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b === btn));
  document.querySelectorAll(".panel").forEach(p =>
    p.classList.toggle("active", p.id === `panel-${tab}`));
});

// ── topbar meta ──────────────────────────────────────────────────────────────
function renderMeta(session) {
  const pt = (session.product_type || "").trim();
  const ptCls = ["MDDI", "PDDI", "PMIC", "SECURITY"].includes(pt) ? pt : "default";
  const fname = session.file_name || "-";
  const edm = String(session.edm_link || "").trim();
  const edmValue = /^https?:\/\//i.test(edm)
    ? `<a href="${esc(edm)}" target="_blank" rel="noopener">${esc(edm)}</a>`
    : esc(edm || "-");
  const items = [
    `<span class="pt-badge ${ptCls}">${esc(pt || "-")}</span>`,
    `<span class="meta-inline"><span class="mk">Product</span>${esc(session.product || "-")}</span>`,
    `<span class="meta-inline"><span class="mk">Revision</span>${esc(session.revision || "-")}</span>`,
    `<span class="meta-inline"><span class="mk">Process</span>${esc(session.process || "-")}</span>`,
    `<span class="meta-inline"><span class="mk">LOT</span>${esc(session.lot_id || "-")}</span>`,
    `<span class="meta-inline"><span class="mk">EDM</span>${edmValue}</span>`,
    `<span class="meta-inline-file" title="${esc(fname)}"><span class="mk">File</span>${esc(fname)}</span>`,
    `<span class="meta-inline"><span class="mk">Uploaded</span>${esc(fmtDate(session.created_at))}</span>`,
    `<span class="meta-inline"><span class="mk">Status</span>${esc(session.status || "-")}</span>`,
  ];
  document.getElementById("topbarMeta").innerHTML = items.join("");
}

// ── read-only helpers ────────────────────────────────────────────────────────
function kvTable(obj) {
  const entries = Object.entries(obj || {}).filter(([k]) => k);
  if (!entries.length) return "";
  return `<table class="kv-table"><tbody>` + entries.map(([k, v]) => {
    const val = (v && typeof v === "object") ? JSON.stringify(v) : (v ?? "");
    return `<tr><th>${esc(k)}</th><td>${esc(val)}</td></tr>`;
  }).join("") + `</tbody></table>`;
}

function rowsTable(rows, preferredCols) {
  if (!rows || !rows.length) return "";
  let cols = preferredCols;
  if (!cols) {
    const seen = [];
    rows.forEach(r => Object.keys(r).forEach(k => { if (!seen.includes(k)) seen.push(k); }));
    cols = seen;
  }
  return `<table><thead><tr>${cols.map(c => `<th>${esc(c)}</th>`).join("")}</tr></thead>` +
    `<tbody>${rows.map(r =>
      `<tr>${cols.map(c => `<td>${esc(r[c])}</td>`).join("")}</tr>`
    ).join("")}</tbody></table>`;
}

function emptyPanel(panel, msg) {
  panel.innerHTML = `<div class="placeholder">${esc(msg)}</div>`;
}

function deriveCols(rows) {
  const seen = [];
  (rows || []).forEach(r => Object.keys(r || {}).forEach(k => { if (!seen.includes(k)) seen.push(k); }));
  return seen;
}

// ── grid model 렌더 (xlsx 원형 재현) ─────────────────────────────────────────
function isGrid(o) { return !!(o && typeof o === "object" && Array.isArray(o.cells)); }

// Excel 열너비(문자단위) → px, 행높이(pt) → px 근사
function colPx(w) { return w ? Math.round(w * 7 + 5) : null; }
function rowPx(h) { return h ? Math.round(h * 4 / 3) : null; }

function gridCellStyle(cell) {
  const s = [];
  if (cell.sz) s.push(`font-size:${cell.sz}px`);
  if (cell.b) s.push("font-weight:700");
  if (cell.a) s.push(`text-align:${cell.a}`);
  return s.join(";");
}

// 헤더행(cells[0])에서 컬럼명 index 찾기 (없으면 -1)
function gridColIndex(grid, name) {
  const head = (grid.cells && grid.cells[0]) || [];
  for (let i = 0; i < head.length; i++) {
    if (String(head[i].t || "").trim() === name) return i;
  }
  return -1;
}

/**
 * grid model → HTML table.
 * opts: { edit:bool, imgMap:{rowIndex:url}, distCol:int }
 */
function renderGrid(grid, opts) {
  opts = opts || {};
  const cols = grid.cols || [];
  const rows = grid.rows || [];
  const cells = grid.cells || [];
  const imgMap = opts.imgMap || {};
  const distCol = (opts.distCol == null) ? -1 : opts.distCol;

  const colgroup = "<colgroup>" + cols.map(c => {
    const w = colPx(c.w);
    return `<col${w ? ` style="width:${w}px"` : ""}>`;
  }).join("") + "</colgroup>";

  const body = cells.map((line, ri) => {
    const h = rowPx(rows[ri] && rows[ri].h);
    const tds = line.map((cell, ci) => {
      const style = gridCellStyle(cell);
      const styleAttr = style ? ` style="${style}"` : "";
      // Distribution 열 + 해당 행 이미지가 있으면 <img> (골격 단계엔 보통 없음)
      if (ci === distCol && imgMap[ri]) {
        return `<td${styleAttr}><img class="dist-img" loading="lazy" src="${esc(imgMap[ri])}" alt="dist ${ri}"></td>`;
      }
      const txt = esc(cell.t || "");
      if (opts.edit && ci !== distCol) {
        return `<td${styleAttr} class="editing" contenteditable="true" data-r="${ri}" data-c="${ci}">${txt}</td>`;
      }
      const cls = (cell.t === "" || cell.t == null) ? ' class="empty"' : "";
      return `<td${styleAttr}${cls}>${txt}</td>`;
    }).join("");
    return `<tr${h ? ` style="height:${h}px"` : ""}>${tds}</tr>`;
  }).join("");

  return `<div class="grid-wrap"><table class="grid-table">${colgroup}<tbody>${body}</tbody></table></div>`;
}

// 편집된 grid DOM → 원본 grid 복제본에 셀 텍스트만 반영
function collectGrid(panelEl, baseGrid) {
  if (!isGrid(baseGrid)) return baseGrid;
  const out = JSON.parse(JSON.stringify(baseGrid));
  panelEl.querySelectorAll("td[data-r]").forEach(td => {
    const r = +td.dataset.r, c = +td.dataset.c;
    if (out.cells[r] && out.cells[r][c]) out.cells[r][c].t = td.textContent;
  });
  return out;
}

// ── sheet-table 렌더 (xlsx 텍스트 데이터 원형 재현) ──────────────────────────

// 열 이름 → 고정 너비(px) — xlsx 실측 기준 패턴
function colWidth(name) {
  const n = String(name || "").toLowerCase().trim();
  if (n === "bin")                      return "50px";
  if (n === "distribution")             return "120px";
  if (n.endsWith("_count"))             return "54px";
  if (n.endsWith("_yield"))             return "60px";
  if (n === "avg")                      return "56px";
  if (n === "item" || n === "category") return "150px";
  if (n === "condition & judge limit")  return "185px";
  if (n === "result")                   return "80px";
  if (n.includes("comment"))            return "220px";
  return "80px";
}

// 값이 숫자인지 (td 정렬용)
function isNumVal(v) { return v !== null && v !== undefined && v !== "" && !isNaN(+v); }

function isDistCol(c) { return String(c || "").toLowerCase() === "distribution"; }

// 열 순서 보정: 고정 prefix 컬럼(step/bin/tno/item, issue 는 category 포함 avg 까지)
// → 지정 순서로 맨 앞에 배치(대소문자 무시), comment 류 → 최우측. 나머지 상대순서 유지.
// 소스 복수 시 _count 그룹 먼저, _yield 그룹 이후 (cnt cnt cnt / yield yield yield).
function orderColumns(cols, kind) {
  const isComment = c => /comment/i.test(String(c));
  const isCnt = c => String(c).endsWith("_count");
  const isYld = c => String(c).endsWith("_yield");

  const comments = cols.filter(isComment);
  let rest = cols.filter(c => !isComment(c));

  const PREFIX_ORDER = {
    yield: ["step", "bin", "tno", "item"],
    issue: ["category", "step", "bin", "tno", "item", "avg"],
  };
  const prefix = PREFIX_ORDER[kind];
  if (prefix) {
    const lower = c => String(c).trim().toLowerCase();
    const front = [];
    prefix.forEach(p => {
      const idx = rest.findIndex(c => lower(c) === p);
      if (idx !== -1) front.push(rest.splice(idx, 1)[0]);
    });
    rest = front.concat(rest);
  }

  // cnt cnt cnt / yield yield yield 그루핑: _count 먼저, _yield 이후
  if (rest.some(isCnt) && rest.some(isYld)) {
    const before = [], cnts = [], ylds = [], after = [];
    let cntYldSeen = false;
    for (const c of rest) {
      if (isCnt(c) || isYld(c)) {
        cntYldSeen = true;
        (isCnt(c) ? cnts : ylds).push(c);
      } else if (!cntYldSeen) {
        before.push(c);
      } else {
        after.push(c);
      }
    }
    rest = before.concat(cnts).concat(ylds).concat(after);
  }

  return rest.concat(comments);
}

// 빈 헤더 placeholder(_colN)는 화면엔 빈칸으로
function headerLabel(c) { return /^_col\d+$/.test(String(c)) ? "" : c; }

// 반복 섹션 헤더 행(yield의 P1/P2/P3 구간별 헤더) 감지: 셀 값이 자기 컬럼명과
// 동일한 비율이 높으면 "헤더가 데이터로 들어간" 행으로 판단.
function isHeaderLikeRow(r, cols) {
  if (!r) return false;
  let total = 0, matches = 0;
  for (const c of cols) {
    const name = String(c).trim().toLowerCase();
    if (!name || /^_col\d+$/.test(name)) continue;
    total++;
    const v = r[c];
    const txt = (v === null || v === undefined) ? "" : String(v).trim().toLowerCase();
    if (txt === name) matches++;
  }
  return total > 0 && (matches / total) >= 0.6;
}

// issue_table 의 CPK 카테고리 전환 행("item name" / "cpk" 서브헤더) 감지.
function isCpkSubheadRow(r) {
  if (!r) return false;
  const cat = String(r["Category"] ?? "").trim().toLowerCase();
  const avg = String(r["avg"] ?? "").trim().toLowerCase();
  return cat === "cpk" && avg === "cpk";
}

/**
 * rows(list of dict) → HTML sheet-table.
 * opts: { edit, imgMap:{rowIndex:url}, kind:"yield"|"issue", columns:[...] }
 *  - columns: 명시적 열 목록(있으면 derive·정렬 생략, 순서 그대로).
 *    데이터행이 없어도 헤더는 항상 렌더 → 내용 없는 컬럼도 유지.
 *  - kind: comment 최우측 / (issue) category 최좌측 정렬.
 */
function renderSheetTable(rows, opts) {
  opts = opts || {};
  let cols;
  if (opts.columns && opts.columns.length) {
    cols = opts.columns.slice();
  } else {
    if (!rows || !rows.length) return "";
    cols = [];
    rows.forEach(r => Object.keys(r || {}).forEach(k => { if (!cols.includes(k)) cols.push(k); }));
    if (opts.kind) cols = orderColumns(cols, opts.kind);
  }
  if (!cols.length) return "";

  const colgroup = "<colgroup>" + cols.map(c =>
    `<col style="width:${colWidth(c)}">`
  ).join("") + "</colgroup>";

  const head = "<thead><tr>" + cols.map(c =>
    `<th>${esc(headerLabel(c))}</th>`
  ).join("") + "</tr></thead>";

  const body = "<tbody>" + (rows || []).map((r, ri) => {
    const subhead = (opts.kind === "yield" && isHeaderLikeRow(r, cols))
      || (opts.kind === "issue" && isCpkSubheadRow(r));
    const tds = cols.map((c, ci) => {
      const v = r ? r[c] : "";
      let txt = (v === null || v === undefined) ? "" : String(v);
      if (subhead && txt.trim().toLowerCase() === "cpk") txt = "CPK";
      const isEmpty = txt === "";
      const isNum = isNumVal(v);
      // Distribution 열: 행별 PNG(있으면)만, 항상 편집 불가.
      if (isDistCol(c)) {
        if (opts.imgMap && opts.imgMap[ri]) {
          return `<td${subhead ? ` class="sheet-subhead"` : ""} data-r="${ri}" data-c="${ci}"><img loading="lazy" src="${esc(opts.imgMap[ri])}" style="max-width:115px;height:auto;display:block" alt="dist"></td>`;
        }
        return `<td class="st-empty${subhead ? " sheet-subhead" : ""}" data-r="${ri}" data-c="${ci}"></td>`;
      }
      if (opts.edit) {
        const cls = "editing-cell" + (isNum ? " st-num" : "") + (subhead ? " sheet-subhead" : "");
        return `<td class="${cls}" contenteditable="true" data-r="${ri}" data-c="${ci}" data-col="${esc(c)}">${esc(txt)}</td>`;
      }
      const clsParts = [];
      if (isEmpty) clsParts.push("st-empty");
      else if (isNum) clsParts.push("st-num");
      if (subhead) clsParts.push("sheet-subhead");
      const cls = clsParts.join(" ");
      return `<td${cls ? ` class="${cls}"` : ""} data-r="${ri}" data-c="${ci}">${isEmpty ? "" : esc(txt)}</td>`;
    }).join("");
    return `<tr>${tds}</tr>`;
  }).join("") + "</tbody>";

  return `<div class="sheet-wrap"><table class="sheet-table">${colgroup}${head}${body}</table></div>`;
}

/**
 * summary blocks({"blocks":[{label,headers,rows}]}) → HTML.
 * opts: { edit:bool }
 */
function renderSummaryBlocks(data, opts) {
  opts = opts || {};
  const blocks = (data && data.blocks) || [];
  return blocks.map(blk => {
    const cols = (blk.headers || []).map((h, i) => h === "" ? `_col${i}` : h);
    const rows = (blk.rows || []).map(row => {
      const obj = {};
      cols.forEach((h, i) => { obj[h] = row[i] !== undefined ? row[i] : null; });
      return obj;
    });
    const title = `<div class="sheet-block-title">${esc(blk.label || "")}</div>`;
    // columns 명시 → 데이터가 비어도 헤더(컬럼)는 항상 표시.
    const tbl = renderSheetTable(rows, Object.assign({}, opts, { columns: cols }));
    return `<div class="sheet-block">${title}${tbl}</div>`;
  }).join("");
}

// 편집된 sheet-table DOM → rows 재구성
function collectSheetTable(panelEl, baseRows) {
  if (!baseRows || !baseRows.length) return baseRows;
  const cols = [];
  baseRows.forEach(r => Object.keys(r || {}).forEach(k => { if (!cols.includes(k)) cols.push(k); }));
  const tds = panelEl.querySelectorAll("td[data-r][data-col]");
  const out = JSON.parse(JSON.stringify(baseRows));
  tds.forEach(td => {
    const ri = +td.dataset.r, col = td.dataset.col;
    if (out[ri] && col in out[ri]) out[ri][col] = td.textContent;
  });
  return out;
}

// summary blocks 편집 수집
function collectSummaryBlocks(panelEl, baseData) {
  if (!baseData || !baseData.blocks) return baseData;
  const out = JSON.parse(JSON.stringify(baseData));
  const blockEls = panelEl.querySelectorAll(".sheet-block");
  out.blocks.forEach((blk, bi) => {
    const blockEl = blockEls[bi];
    if (!blockEl) return;
    const tds = blockEl.querySelectorAll("td[data-r][data-c]");
    tds.forEach(td => {
      const ri = +td.dataset.r, ci = +td.dataset.c;
      if (out.blocks[bi].rows[ri] !== undefined) {
        out.blocks[bi].rows[ri][ci] = td.textContent;
      }
    });
  });
  return out;
}

// isSummaryBlocks: {"blocks":[...]} 형태인지
function isSummaryBlocks(o) {
  return !!(o && typeof o === "object" && Array.isArray(o.blocks) && o.blocks.length > 0);
}

// issue_images([{row,url}]) → {rowIndex:url}
function issueImgMap(issue_images) {
  const m = {};
  (issue_images || []).forEach(it => { m[it.row] = it.url; });
  return m;
}

// ── Summary (read) ────────────────────────────────────────────────────────────
function renderSummary(summary_text, summary_rows) {
  const panel = document.getElementById("panel-summary");

  // 신규 포맷: {"blocks":[...]}
  if (isSummaryBlocks(summary_text)) {
    panel.innerHTML = `<div class="section-title">Summary</div>` + renderSummaryBlocks(summary_text);
    return;
  }

  // 구형 하위호환: grid
  if (isGrid(summary_text)) {
    panel.innerHTML = `<div class="section-title">Summary</div>` + renderGrid(summary_text);
    return;
  }

  // 구형 하위호환: legacy dict
  const st = summary_text || {};
  const blocks = [];

  if (st.title) blocks.push(`<div class="section-title">${esc(st.title)}</div>`);

  if (st.feature && Object.keys(st.feature).length) {
    blocks.push(`<div class="section-title">Feature</div>`);
    blocks.push(kvTable(st.feature));
  }

  if (Array.isArray(st.yield_summary_text) && st.yield_summary_text.length) {
    blocks.push(`<div class="section-title small">Yield Summary</div>`);
    blocks.push(`<div class="text-lines">` +
      st.yield_summary_text.map(line => `<div>${esc(line)}</div>`).join("") + `</div>`);
  }

  if (Array.isArray(st.major_fail_bins) && st.major_fail_bins.length) {
    blocks.push(`<div class="section-title small">Major Fail Bins</div>`);
    blocks.push(rowsTable(st.major_fail_bins));
  }

  if (st.evaluation && Object.keys(st.evaluation).length) {
    blocks.push(`<div class="section-title small">Evaluation Summary</div>`);
    blocks.push(kvTable(st.evaluation));
  }

  if (Array.isArray(st.raw_rows) && st.raw_rows.length) {
    blocks.push(`<div class="section-title">Summary</div>`);
    blocks.push(`<div class="text-lines">` +
      st.raw_rows.map(r => `<div>${esc(r.join("  |  "))}</div>`).join("") + `</div>`);
  }

  const meaningful = blocks.filter(b => b && !b.includes("section-title"));
  if (meaningful.length) {
    panel.innerHTML = blocks.join("");
    return;
  }

  if (summary_rows && summary_rows.length) {
    panel.innerHTML = `<div class="section-title">Summary</div>` +
      rowsTable(summary_rows, ["item_name", "bin_number", "yield_percent", "fail_count", "mean_val"]);
    return;
  }
  emptyPanel(panel, "Summary 데이터 없음");
}

// ── Yield (read) ──────────────────────────────────────────────────────────────
function renderYield(yield_text, summary_rows) {
  const panel = document.getElementById("panel-yield");

  // 신규 포맷: list of dicts
  if (Array.isArray(yield_text) && yield_text.length) {
    panel.innerHTML = `<div class="section-title">Yield</div>` +
      renderSheetTable(yield_text, { kind: "yield" });
    return;
  }

  // 구형 하위호환: grid
  if (isGrid(yield_text)) {
    panel.innerHTML = `<div class="section-title">Yield</div>` + renderGrid(yield_text);
    return;
  }

  if (!summary_rows || !summary_rows.length) {
    emptyPanel(panel, "Yield 데이터 없음");
    return;
  }
  panel.innerHTML = `<div class="section-title">Yield</div>` +
    rowsTable(summary_rows, ["bin_number", "item_name", "yield_percent", "fail_count", "mean_val"]);
}

// ── Issue Table (read) ──────────────────────────────────────────────────────
function renderIssues(issue_table_text, issue_images) {
  const panel = document.getElementById("panel-issues");
  const imgMap = issueImgMap(issue_images);

  // 신규 포맷: list of dicts
  if (Array.isArray(issue_table_text) && issue_table_text.length) {
    panel.innerHTML = `<div class="section-title">Issue Table</div>` +
      renderSheetTable(issue_table_text, { imgMap, kind: "issue" });
    return;
  }

  // 구형 하위호환: grid
  if (isGrid(issue_table_text)) {
    const distCol = gridColIndex(issue_table_text, "Distribution");
    panel.innerHTML = `<div class="section-title">Issue Table</div>` +
      renderGrid(issue_table_text, { imgMap, distCol });
    return;
  }

  if (!issue_table_text || !issue_table_text.length) {
    emptyPanel(panel, "Issue Table 데이터 없음");
    return;
  }
  panel.innerHTML = `<div class="section-title">Issue Table</div>` + rowsTable(issue_table_text);
}

// ── 편집용 위젯 ────────────────────────────────────────────────────────────
function editRowHtml(r, cols) {
  return `<tr>` + cols.map(c =>
    `<td><input class="cell-input" data-col="${esc(c)}" value="${esc(r ? r[c] : "")}"></td>`
  ).join("") + `<td><button type="button" class="btn-del-row" title="행 삭제">×</button></td></tr>`;
}

function editTableHtml(rows, cols, tableId) {
  const head = cols.map(c => `<th data-col="${esc(c)}">${esc(c)}</th>`).join("") + `<th></th>`;
  const body = (rows || []).map(r => editRowHtml(r, cols)).join("");
  return `<table class="edit-table" id="${tableId}"><thead><tr>${head}</tr></thead>` +
         `<tbody>${body}</tbody></table>` +
         `<button type="button" class="btn-sm add-row" data-table="${tableId}">+ 행 추가</button>`;
}

function readEditTable(tableEl) {
  if (!tableEl) return null;
  const cols = [...tableEl.querySelectorAll("thead th[data-col]")].map(th => th.dataset.col);
  const rows = [];
  tableEl.querySelectorAll("tbody tr").forEach(tr => {
    const obj = {};
    tr.querySelectorAll("input.cell-input").forEach(inp => { obj[inp.dataset.col] = inp.value; });
    if (cols.some(c => String(obj[c] ?? "").trim() !== "")) rows.push(obj);
  });
  return rows;
}

function kvEditHtml(obj, group) {
  const entries = Object.entries(obj || {}).filter(([k]) => k);
  if (!entries.length) return "";
  return `<div class="kv-edit">` + entries.map(([k, v]) => {
    const val = (v && typeof v === "object") ? JSON.stringify(v) : (v ?? "");
    return `<label title="${esc(k)}">${esc(k)}</label>` +
      `<input class="field-input" data-f="${esc(group)}" data-key="${esc(k)}" value="${esc(val)}">`;
  }).join("") + `</div>`;
}

// ── Summary (edit) ────────────────────────────────────────────────────────────
function renderSummaryEdit() {
  const panel = document.getElementById("panel-summary");

  // 신규 포맷
  if (isSummaryBlocks(DATA.summary_text)) {
    panel.innerHTML = `<div class="edit-section-title">Summary</div>` +
      `<div class="edit-hint">셀을 클릭해 텍스트를 수정하세요.</div>` +
      renderSummaryBlocks(DATA.summary_text, { edit: true });
    return;
  }

  // 구형 하위호환: grid
  if (isGrid(DATA.summary_text)) {
    panel.innerHTML = `<div class="edit-section-title">Summary</div>` +
      `<div class="edit-hint">셀을 직접 클릭해 텍스트를 수정하세요. 표 구조/크기는 유지됩니다.</div>` +
      renderGrid(DATA.summary_text, { edit: true });
    return;
  }
  const st = DATA.summary_text || {};
  const blocks = [];

  blocks.push(`<div class="edit-section-title">Title</div>`);
  blocks.push(`<input class="field-input title" data-f="title" value="${esc(st.title || "")}">`);

  if (st.feature && Object.keys(st.feature).length) {
    blocks.push(`<div class="edit-section-title">Feature</div>`);
    blocks.push(kvEditHtml(st.feature, "feature"));
  }

  blocks.push(`<div class="edit-section-title">Yield Summary</div>`);
  blocks.push(`<div class="edit-hint">한 줄에 한 항목.</div>`);
  blocks.push(`<textarea class="field-textarea" data-f="yield_summary_text">` +
    esc((st.yield_summary_text || []).join("\n")) + `</textarea>`);

  if (Array.isArray(st.major_fail_bins) && st.major_fail_bins.length) {
    blocks.push(`<div class="edit-section-title">Major Fail Bins</div>`);
    blocks.push(editTableHtml(st.major_fail_bins, deriveCols(st.major_fail_bins), "tbl-mfb"));
  }

  if (st.evaluation && Object.keys(st.evaluation).length) {
    blocks.push(`<div class="edit-section-title">Evaluation Summary</div>`);
    blocks.push(kvEditHtml(st.evaluation, "evaluation"));
  }

  if (Array.isArray(st.raw_rows) && st.raw_rows.length) {
    blocks.push(`<div class="edit-section-title">Summary (raw rows)</div>`);
    blocks.push(`<div class="edit-hint">한 줄에 한 행, 셀은 탭(Tab)으로 구분.</div>`);
    blocks.push(`<textarea class="field-textarea" data-f="raw_rows">` +
      esc(st.raw_rows.map(r => (Array.isArray(r) ? r.join("\t") : r)).join("\n")) + `</textarea>`);
  }

  panel.innerHTML = blocks.join("");
}

function collectSummaryText() {
  const panel = document.getElementById("panel-summary");
  const out = DATA.summary_text ? JSON.parse(JSON.stringify(DATA.summary_text)) : {};

  const titleInp = panel.querySelector('[data-f="title"]');
  if (titleInp) out.title = titleInp.value;

  const featInputs = panel.querySelectorAll('[data-f="feature"]');
  if (featInputs.length) {
    out.feature = {};
    featInputs.forEach(i => { out.feature[i.dataset.key] = i.value; });
  }

  const yst = panel.querySelector('[data-f="yield_summary_text"]');
  if (yst) out.yield_summary_text = splitLines(yst.value);

  const mfb = readEditTable(document.getElementById("tbl-mfb"));
  if (mfb !== null) out.major_fail_bins = mfb;

  const evalInputs = panel.querySelectorAll('[data-f="evaluation"]');
  if (evalInputs.length) {
    out.evaluation = {};
    evalInputs.forEach(i => { out.evaluation[i.dataset.key] = i.value; });
  }

  const rr = panel.querySelector('[data-f="raw_rows"]');
  if (rr) out.raw_rows = splitLines(rr.value).map(line => line.split("\t"));

  return out;
}

// ── Yield (edit) ──────────────────────────────────────────────────────────────
function renderYieldEdit() {
  const panel = document.getElementById("panel-yield");

  // 신규 포맷: list of dicts
  if (Array.isArray(DATA.yield_text) && DATA.yield_text.length) {
    panel.innerHTML = `<div class="edit-section-title">Yield</div>` +
      `<div class="edit-hint">셀을 클릭해 텍스트를 수정하세요.</div>` +
      renderSheetTable(DATA.yield_text, { edit: true, kind: "yield" });
    return;
  }

  // 구형 하위호환: grid
  if (isGrid(DATA.yield_text)) {
    panel.innerHTML = `<div class="edit-section-title">Yield</div>` +
      `<div class="edit-hint">셀을 직접 클릭해 텍스트를 수정하세요. 표 구조/크기는 유지됩니다.</div>` +
      renderGrid(DATA.yield_text, { edit: true });
    return;
  }

  panel.innerHTML = `<div class="edit-section-title">Yield</div>` +
    `<div class="edit-hint">item_name 이 빈 행은 저장되지 않습니다.</div>` +
    editTableHtml(DATA.summary || [], YIELD_COLS, "tbl-yield");
}

// ── Issue Table (edit) ──────────────────────────────────────────────────────
function renderIssuesEdit() {
  const panel = document.getElementById("panel-issues");
  const imgMap = issueImgMap(DATA.issue_images);

  // 신규 포맷: list of dicts
  if (Array.isArray(DATA.issue_table_text) && DATA.issue_table_text.length) {
    panel.innerHTML = `<div class="edit-section-title">Issue Table</div>` +
      `<div class="edit-hint">셀을 클릭해 텍스트를 수정하세요. (Distribution 열은 수정 불가)</div>` +
      renderSheetTable(DATA.issue_table_text, { edit: true, imgMap, kind: "issue" });
    return;
  }

  // 구형 하위호환: grid
  if (isGrid(DATA.issue_table_text)) {
    const distCol = gridColIndex(DATA.issue_table_text, "Distribution");
    panel.innerHTML = `<div class="edit-section-title">Issue Table</div>` +
      `<div class="edit-hint">셀을 직접 클릭해 텍스트를 수정하세요. 표 구조/크기·이미지는 유지됩니다.</div>` +
      renderGrid(DATA.issue_table_text, { edit: true, imgMap, distCol });
    return;
  }

  const rows = DATA.issue_table_text || [];
  const cols = deriveCols(rows);
  if (!cols.length) {
    emptyPanel(panel, "Issue Table 데이터 없음 — 편집할 컬럼 정보가 없습니다.");
    return;
  }
  panel.innerHTML = `<div class="edit-section-title">Issue Table</div>` +
    editTableHtml(rows, cols, "tbl-issue");
}

// ── 모드 전환 ──────────────────────────────────────────────────────────────
function renderActive() {
  clearCellSel();
  if (MODE === "edit") {
    renderSummaryEdit();
    renderYieldEdit();
    renderIssuesEdit();
  } else {
    renderSummary(DATA.summary_text, DATA.summary);
    renderYield(DATA.yield_text, DATA.summary);
    renderIssues(DATA.issue_table_text, DATA.issue_images);
  }
}

function setMode(m) {
  MODE = m;
  if (m !== "edit") { verifiedPassword = ""; _dirty = false; }
  document.getElementById("editBar").classList.toggle("show", m === "edit");
  // 수정 모드일 땐 topbar 버튼 숨김 (edit bar 가 역할 대체)
  document.getElementById("topbarActions").style.display = m === "edit" ? "none" : "";
  renderActive();
}

// add/delete row (편집 테이블 공용 위임)
document.querySelector(".content").addEventListener("click", e => {
  const addBtn = e.target.closest(".add-row");
  if (addBtn) {
    const table = document.getElementById(addBtn.dataset.table);
    const cols = [...table.querySelectorAll("thead th[data-col]")].map(th => th.dataset.col);
    table.querySelector("tbody").insertAdjacentHTML("beforeend", editRowHtml(null, cols));
    return;
  }
  const delBtn = e.target.closest(".btn-del-row");
  if (delBtn) { delBtn.closest("tr").remove(); }
});

// ── edit entry ──────────────────────────────────────────────────────────────
function enterEdit() {
  if (!DATA) return;
  const needPw = !!(DATA.session && DATA.session.has_password);
  if (!needPw) { setMode("edit"); return; }
  openPin("edit");
}

document.getElementById("btnEdit").addEventListener("click", enterEdit);
document.getElementById("btnDel").addEventListener("click", () => {
  if (!DATA) return;
  const needPw = !!(DATA.session && DATA.session.has_password);
  if (!needPw) { doDelete(""); return; }
  openPin("delete");
});

// ── save / cancel ─────────────────────────────────────────────────────────────
let _dirty = false;        // 수정 모드에서 셀이 변경되면 true
let _autoSaving = false;   // 자동저장 진행 중 중복 방지

// edit bar 상태표시 dot
function _setDot(state) {
  const dot = document.getElementById("autosaveDot");
  if (!dot) return;
  dot.className = "autosave-dot" + (state ? " " + state : "");
}

// dirty 마킹: 수정 모드에서 contenteditable 또는 input 변경 시
document.querySelector(".content").addEventListener("input", () => {
  if (MODE !== "edit") return;
  _dirty = true;
  _setDot("dirty");
});

document.getElementById("editCancel").addEventListener("click", () => {
  _dirty = false;
  setMode("view");
});
document.getElementById("editSave").addEventListener("click", saveEdits);

// payload 조립 (saveEdits / autoSave 공용)
function buildPayload() {
  const payload = { password: verifiedPassword };

  if (isSummaryBlocks(DATA.summary_text)) {
    payload.summary_text = collectSummaryBlocks(document.getElementById("panel-summary"), DATA.summary_text);
  } else if (isGrid(DATA.summary_text)) {
    payload.summary_text = collectGrid(document.getElementById("panel-summary"), DATA.summary_text);
  } else {
    payload.summary_text = collectSummaryText();
  }

  if (Array.isArray(DATA.yield_text) && DATA.yield_text.length) {
    payload.yield_text = collectSheetTable(document.getElementById("panel-yield"), DATA.yield_text);
  } else if (isGrid(DATA.yield_text)) {
    payload.yield_text = collectGrid(document.getElementById("panel-yield"), DATA.yield_text);
  } else {
    payload.yield_rows = readEditTable(document.getElementById("tbl-yield")) || [];
  }

  if (Array.isArray(DATA.issue_table_text) && DATA.issue_table_text.length) {
    payload.issue_table_text = collectSheetTable(document.getElementById("panel-issues"), DATA.issue_table_text);
  } else if (isGrid(DATA.issue_table_text)) {
    payload.issue_table_text = collectGrid(document.getElementById("panel-issues"), DATA.issue_table_text);
  } else {
    const issueTbl = document.getElementById("tbl-issue");
    if (issueTbl) payload.issue_rows = readEditTable(issueTbl);
  }

  return payload;
}

async function saveEdits() {
  if (!DATA) return;
  const payload = buildPayload();
  const saveBtn = document.getElementById("editSave");
  saveBtn.disabled = true;
  _setDot("saving");
  try {
    const res = await fetch(`/pe/report/session/${SESSION_ID}/content`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", "X-CSRF-Token": csrfToken() },
      body: JSON.stringify(payload),
    });
    const j = await res.json().catch(() => ({}));
    if (res.status === 403) { showToast(j.error || "비밀번호가 일치하지 않습니다."); _setDot("dirty"); return; }
    if (!res.ok && res.status !== 207) { showToast(j.error || "저장 실패"); _setDot("dirty"); return; }
    if (res.status === 207) {
      showToast("일부만 저장됨: " + Object.keys(j.errors || {}).join(", "));
    } else {
      showToast("저장되었습니다.");
    }
    _dirty = false;
    _setDot("saved");
    await load(false);
    setMode("view");
  } catch (e) {
    showToast("저장 실패: " + e.message);
    _setDot("dirty");
  } finally {
    saveBtn.disabled = false;
  }
}

// 자동저장: 페이지가 숨겨질 때(탭 전환·창 최소화 등) 변경사항 자동 저장.
// keepalive:true 로 페이지 언로드 중에도 요청이 완료된다.
async function autoSave() {
  if (!DATA || MODE !== "edit" || !_dirty || _autoSaving) return;
  _autoSaving = true;
  _setDot("saving");
  const payload = buildPayload();
  _dirty = false;  // optimistic
  try {
    const res = await fetch(`/pe/report/session/${SESSION_ID}/content`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", "X-CSRF-Token": csrfToken() },
      body: JSON.stringify(payload),
      keepalive: true,
    });
    if (!res.ok) { _dirty = true; _setDot("dirty"); }
    else _setDot("saved");
  } catch (_) {
    _dirty = true;
    _setDot("dirty");
  } finally {
    _autoSaving = false;
  }
}

// 탭이 백그라운드로 가거나 창이 최소화될 때 자동저장
document.addEventListener("visibilitychange", () => {
  if (document.hidden) autoSave();
});

// 페이지를 떠날 때: dirty 상태면 브라우저 경고 + keepalive 저장 시도
window.addEventListener("beforeunload", e => {
  if (MODE === "edit" && _dirty) {
    autoSave();            // keepalive 요청 발사 (비동기, 브라우저가 완료 보장)
    e.preventDefault();
    e.returnValue = "";    // 브라우저 "변경사항이 저장되지 않을 수 있습니다" 경고
  }
});

// ── PIN modal ─────────────────────────────────────────────────────────────────
let _pinPurpose = null;   // "edit" | "delete"
const PIN_IDS = ["pin0", "pin1", "pin2", "pin3"];

function openPin(purpose) {
  _pinPurpose = purpose;
  document.getElementById("pinTitle").textContent =
    purpose === "delete" ? "세션 삭제" : "수정 모드 진입";
  document.getElementById("pinDesc").textContent =
    purpose === "delete" ? "삭제하려면 비밀번호를 입력하세요." : "수정하려면 비밀번호를 입력하세요.";
  const confirmBtn = document.getElementById("pinConfirm");
  confirmBtn.textContent = purpose === "delete" ? "삭제" : "확인";
  confirmBtn.classList.toggle("danger", purpose === "delete");
  confirmBtn.classList.toggle("primary", purpose !== "delete");
  PIN_IDS.forEach(id => document.getElementById(id).value = "");
  document.getElementById("pinModal").classList.add("show");
  document.getElementById("pin0").focus();
}

function closePin() { document.getElementById("pinModal").classList.remove("show"); }
function readPin() { return PIN_IDS.map(id => document.getElementById(id).value).join(""); }

document.getElementById("pinCancel").addEventListener("click", closePin);
document.getElementById("pinConfirm").addEventListener("click", async () => {
  const pin = readPin();
  if (pin.length !== 4) { showToast("비밀번호 4자리를 입력하세요."); return; }
  if (_pinPurpose === "delete") {
    closePin();
    doDelete(pin);
  } else {
    // 수정: 먼저 검증 후 진입
    try {
      const res = await fetch(`/pe/report/session/${SESSION_ID}/verify_password`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-CSRF-Token": csrfToken() },
        body: JSON.stringify({ password: pin }),
      });
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        showToast(j.error || "비밀번호가 일치하지 않습니다.");
        return;
      }
      verifiedPassword = pin;
      closePin();
      setMode("edit");
    } catch (e) {
      showToast("확인 실패: " + e.message);
    }
  }
});

async function doDelete(pin) {
  try {
    const res = await fetch(`/pe/report/session/${SESSION_ID}`, {
      method: "DELETE",
      headers: { "Content-Type": "application/json", "X-CSRF-Token": csrfToken() },
      body: JSON.stringify({ password: pin }),
    });
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      showToast(j.error || "삭제 실패");
      return;
    }
    showToast("삭제되었습니다. 검색결과로 이동합니다.");
    setTimeout(() => { location.href = "/pe/report/"; }, 700);
  } catch (e) {
    showToast("삭제 실패: " + e.message);
  }
}

// PIN cell auto-advance
document.querySelectorAll(".pin-cell").forEach((c, i, arr) => {
  c.addEventListener("input", () => {
    // type=password 는 숫자 강제가 안 되므로 비숫자 제거 후 마지막 한 자리만 유지
    c.value = c.value.replace(/\D/g, "").slice(-1);
    if (c.value && i < arr.length - 1) arr[i + 1].focus();
  });
  c.addEventListener("keydown", e => {
    if (e.key === "Backspace" && !c.value && i > 0) arr[i - 1].focus();
    if (e.key === "Enter") document.getElementById("pinConfirm").click();
  });
});

// ── load ──────────────────────────────────────────────────────────────────────
async function load(resetMode=true) {
  try {
    const res = await fetch(`/pe/report/session/${SESSION_ID}/full`, { cache: "no-store" });
    if (!res.ok) {
      const box = document.getElementById("errorBox");
      box.style.display = "";
      box.textContent = `세션을 불러올 수 없습니다 (${res.status})`;
      return;
    }
    DATA = await res.json();
    seedEmptyFrames();
    renderMeta(DATA.session || {});
    if (resetMode) {
      setMode("view");
      if (new URLSearchParams(location.search).get("mode") === "edit") {
        history.replaceState({}, "", location.pathname);  // 새로고침 시 재진입 방지
        enterEdit();
      }
    } else {
      renderActive();
    }
  } catch (e) {
    const box = document.getElementById("errorBox");
    box.style.display = "";
    box.textContent = "로드 실패: " + e.message;
  }
}

// ── 선택 셀 합계/평균 (엑셀 상태바) ───────────────────────────────────────────
function fmtNum(n) {
  const r = Math.round(n * 1e6) / 1e6;
  if (Number.isInteger(r)) return String(r);
  return r.toFixed(4).replace(/0+$/, "").replace(/\.$/, "");
}

// 수정 모드: 셀 텍스트 드래그 선택 → 숫자 토큰 합계/평균 (기존 동작 유지).
function updateCalc() {
  if (MODE !== "edit") return;
  const bar = document.getElementById("calcBar");
  const sel = window.getSelection ? window.getSelection() : null;
  const text = sel ? String(sel.toString()) : "";
  // 천단위 콤마 제거 후 숫자 토큰 추출
  const nums = (text.match(/-?\d[\d,]*\.?\d*/g) || [])
    .map(s => parseFloat(s.replace(/,/g, "")))
    .filter(n => !isNaN(n));
  if (nums.length < 2) { bar.classList.remove("show"); return; }
  const sum = nums.reduce((a, b) => a + b, 0);
  const avg = sum / nums.length;
  bar.innerHTML =
    `<span><span class="ci">개수</span><span class="cv">${nums.length}</span></span>` +
    `<span><span class="ci">합계</span><span class="cv">${fmtNum(sum)}</span></span>` +
    `<span><span class="ci">평균</span><span class="cv">${fmtNum(avg)}</span></span>`;
  bar.classList.toggle("lift", MODE === "edit");
  bar.classList.add("show");
}
document.addEventListener("selectionchange", updateCalc);
document.addEventListener("mouseup", updateCalc);

// 보기 모드: Ctrl/Shift 로 셀 단위 다중 선택 → 선택 셀의 합계/평균 표시.
let cellSelTable = null;
let cellSelCells = new Set();
let cellSelAnchor = null;

function cellKey(r, c) { return r + "," + c; }

function clearCellSel() {
  if (cellSelTable) {
    cellSelTable.querySelectorAll("td.cell-selected").forEach(td => td.classList.remove("cell-selected"));
  }
  cellSelTable = null;
  cellSelCells.clear();
  cellSelAnchor = null;
  const bar = document.getElementById("calcBar");
  if (MODE !== "edit") bar.classList.remove("show");
}

function applyCellSel() {
  if (!cellSelTable) return;
  cellSelTable.querySelectorAll("td[data-r]").forEach(td => {
    td.classList.toggle("cell-selected", cellSelCells.has(cellKey(td.dataset.r, td.dataset.c)));
  });
}

function selectRange(r1, c1, r2, c2) {
  const rMin = Math.min(r1, r2), rMax = Math.max(r1, r2);
  const cMin = Math.min(c1, c2), cMax = Math.max(c1, c2);
  cellSelCells.clear();
  for (let r = rMin; r <= rMax; r++) {
    for (let c = cMin; c <= cMax; c++) cellSelCells.add(cellKey(r, c));
  }
}

function updateCellCalc() {
  const bar = document.getElementById("calcBar");
  if (!cellSelTable || !cellSelCells.size) { bar.classList.remove("show"); return; }
  const nums = [];
  cellSelTable.querySelectorAll("td[data-r]").forEach(td => {
    if (!cellSelCells.has(cellKey(td.dataset.r, td.dataset.c))) return;
    const txt = td.textContent.replace(/,/g, "").trim();
    if (txt !== "" && !isNaN(+txt)) nums.push(+txt);
  });
  if (!nums.length) { bar.classList.remove("show"); return; }
  const sum = nums.reduce((a, b) => a + b, 0);
  const avg = sum / nums.length;
  bar.innerHTML =
    `<span><span class="ci">개수</span><span class="cv">${nums.length}</span></span>` +
    `<span><span class="ci">합계</span><span class="cv">${fmtNum(sum)}</span></span>` +
    `<span><span class="ci">평균</span><span class="cv">${fmtNum(avg)}</span></span>`;
  bar.classList.remove("lift");
  bar.classList.add("show");
}

document.addEventListener("click", e => {
  if (MODE !== "view") return;
  const td = e.target.closest("td[data-r]");
  if (!td) return;
  const table = td.closest("table.sheet-table");
  if (!table) return;
  const r = +td.dataset.r, c = +td.dataset.c;

  if (table !== cellSelTable) {
    clearCellSel();
    cellSelTable = table;
  }

  if (e.shiftKey && cellSelAnchor) {
    selectRange(cellSelAnchor.r, cellSelAnchor.c, r, c);
  } else if (e.ctrlKey || e.metaKey) {
    const key = cellKey(r, c);
    if (cellSelCells.has(key)) cellSelCells.delete(key);
    else cellSelCells.add(key);
    cellSelAnchor = { r, c };
  } else {
    cellSelCells.clear();
    cellSelCells.add(cellKey(r, c));
    cellSelAnchor = { r, c };
  }

  applyCellSel();
  updateCellCalc();
});

load();
</script>
